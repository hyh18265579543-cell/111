<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>多Agent运营控制台</title>
<style>
body { font-family: Arial; margin: 40px; }
input { padding: 8px; width: 300px; }
button { padding: 8px 12px; }
pre { background: #f5f5f5; padding: 10px; margin-top: 20px; }
</style>
</head>
<body>

<h2>多Agent运营控制台（前端MVP）</h2>

<input id="input" placeholder="输入任务"/>
<button onclick="send()">提交</button>

<pre id="output"></pre>

<script>
async function send() {
    let text = document.getElementById("input").value;

    let res = await fetch("http://127.0.0.1:8000/task?input_text=" + text, {
        method: "POST"
    });

    let data = await res.json();
    let id = data.task_id;

    setInterval(async () => {
        let r = await fetch(`http://127.0.0.1:8000/task/${id}`);
        let d = await r.json();
        document.getElementById("output").innerText = JSON.stringify(d, null, 2);
    }, 1000);
}
</script>

</body>
</html>
